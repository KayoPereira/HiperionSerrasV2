<!doctype html>

<html lang="pt-BR">

  <head>

    <title>Página não encontrada - Hiperion Serras</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="A página que você procura não foi encontrada. Volte para a página inicial da Hiperion Serras.">
    <meta name="theme-color" content="#D2AC47">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

      *, *::before, *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        background: linear-gradient(135deg, #1D2331 0%, #2a3442 100%);
        color: #f5f5f5;
        display: flex;
        flex-direction: column;
        font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Aptos, Roboto, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 1rem;
        -webkit-font-smoothing: antialiased;
        font-style: normal;
        font-weight: 400;
        letter-spacing: -0.0025em;
        line-height: 1.6;
        min-height: 100vh;
        text-rendering: optimizeLegibility;
        -webkit-text-size-adjust: 100%;
      }

      a {
        color: #D2AC47;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        padding-bottom: 2px;
        border-bottom: 2px solid transparent;
      }

      a:hover,
      a:focus {
        color: #e8c869;
        border-bottom-color: #D2AC47;
        outline: none;
      }

      a:focus-visible {
        outline: 3px solid #D2AC47;
        outline-offset: 4px;
      }

      /* ── Navbar ────────────────────────────────────────────────────── */
      .navbar-hiperion {
        background-color: #1D2331;
        border-bottom: 3px solid #D2AC47;
        padding: 0 !important;
      }

      .navbar-hiperion__container {
        width: 100%;
        max-width: 1320px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 80px;
      }

      .navbar-logo {
        height: 60px;
        width: auto;
        display: block;
      }

      .navbar-hiperion__nav {
        display: flex;
        align-items: center;
        gap: 0;
        list-style: none;
        margin: 0;
      }

      .navbar-hiperion__nav li {
        padding: 0 16px;
        height: 100%;
        display: flex;
        align-items: center;
      }

      .navbar-link {
        font-family: "Montserrat", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: -0.05em;
        color: #FFFFFF;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .navbar-link:hover {
        color: #D2AC47;
      }

      .secondary-btn {
        border: 2px solid #D2AC47;
        color: #D2AC47;
        padding: 10px 20px;
        border-radius: 4px;
        font-weight: 700;
        font-size: 13px;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .secondary-btn:hover {
        background-color: #D2AC47;
        color: #1D2331;
      }

      b, strong {
        font-weight: 700;
      }

      i, em {
        font-style: italic;
      }

      main {
        display: grid;
        gap: 2em;
        padding: 6em 2em 2em;
        place-items: center;
        text-align: center;
        flex: 1;
        justify-content: center;
        max-width: 900px;
        margin: 0 auto;
      }

      main header {
        width: min(100%, 200px);
        margin-bottom: 1em;
      }

      main header svg {
        height: auto;
        max-width: 100%;
        width: 100%;
        filter: drop-shadow(0 4px 12px rgba(230, 57, 70, 0.3));
      }

      .error-code {
        font-size: clamp(3rem, 12vw, 8rem);
        font-weight: 800;
        color: #D2AC47;
        line-height: 1;
        margin: 0.2em 0;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      main article {
        width: min(100%, 40em);
      }

      main article h1 {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        margin-bottom: 0.5em;
        color: #FFFFFF;
        font-weight: 700;
        font-family: "Montserrat", sans-serif;
      }

      main article p {
        font-size: 1.1rem;
        margin-bottom: 1em;
        color: #e0e0e0;
        line-height: 1.8;
      }

      .action-buttons {
        display: flex;
        gap: 1em;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 2em;
      }

      .btn {
        display: inline-block;
        padding: 0.875em 2em;
        border-radius: 6px;
        font-weight: 600;
        font-size: 1rem;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 2px solid transparent;
        cursor: pointer;
        font-family: "Montserrat", sans-serif;
        letter-spacing: -0.05em;
      }

      .btn-primary {
        background-color: #D2AC47;
        color: #1D2331;
      }

      .btn-primary:hover,
      .btn-primary:focus {
        background-color: #e8c869;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(210, 172, 71, 0.4);
      }

      .btn-secondary {
        background-color: transparent;
        color: #D2AC47;
        border: 2px solid #D2AC47;
      }

      .btn-secondary:hover,
      .btn-secondary:focus {
        background-color: #D2AC47;
        color: #1D2331;
        transform: translateY(-2px);
      }

      /* ── Footer ────────────────────────────────────────────────── */
      footer {
        background-color: #1D2331;
        color: #FFFFFF;
        font-family: "Montserrat", sans-serif;
        margin-top: auto;
      }

      .hiperion-footer__main {
        display: grid;
        grid-template-columns: 1.3fr 1fr 1fr 1.2fr;
        column-gap: 48px;
        padding: 48px 24px;
        max-width: 1320px;
        margin: 0 auto;
      }

      .hiperion-footer__brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: max-content;
      }

      .hiperion-footer__logo {
        width: 160px;
        height: auto;
        display: block;
        margin-bottom: 14px;
      }

      .hiperion-footer__tagline {
        margin: 0 0 32px;
        color: #FFFFFF;
        font-size: 13px;
        font-style: italic;
        font-weight: 700;
        line-height: 1;
      }

      .hiperion-footer__title {
        margin-bottom: 16px;
        color: #D2AC47;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1.1;
        text-transform: uppercase;
      }

      .hiperion-footer__social {
        display: flex;
        gap: 18px;
        align-items: center;
      }

      .hiperion-footer__social a {
        color: #FFFFFF;
        font-size: 24px;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .hiperion-footer__social a:hover {
        color: #D2AC47;
      }

      .hiperion-footer__menu ul,
      .hiperion-footer__contacts ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .hiperion-footer__menu li,
      .hiperion-footer__contacts li {
        margin-bottom: 14px;
      }

      .hiperion-footer__menu a,
      .hiperion-footer__contacts a {
        color: #FFFFFF;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.15;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .hiperion-footer__menu a:hover,
      .hiperion-footer__contacts a:hover {
        color: #D2AC47;
      }

      .hiperion-footer__bottom {
        background-color: #D2AC47;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1D2331;
        font-weight: 700;
        font-size: 13px;
      }

      @media (max-width: 991px) {
        main {
          padding: 5em 1.5em 1.5em;
          gap: 1.5em;
        }

        .action-buttons {
          flex-direction: column;
          gap: 0.75em;
        }

        .btn {
          width: 100%;
        }

        .hiperion-footer__main {
          grid-template-columns: 1fr;
          gap: 32px;
          padding: 32px 16px;
        }

        .navbar-hiperion__nav {
          flex-direction: column;
          gap: 16px;
          padding: 16px 0;
        }

        .navbar-hiperion__nav li {
          padding: 8px 0;
        }

        main article p {
          font-size: 1rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        a,
        .btn {
          transition: none;
        }
      }

    </style>

  </head>
